# ランタイム / ツールバージョンの single source of truth（ホスト側）。
# コンテナは公式 image を使うため、Dockerfile の FROM 行で同じバージョンを書いて手動同期する:
#   - backend/Dockerfile:   python:3.14.5-slim, ghcr.io/astral-sh/uv:0.11.19
#   - frontend/Dockerfile:  node:24.16.0-bookworm-slim

[tools]
node = "24.16.0"
python = "3.14.5"
uv = "0.11.19"

[env]
# package.json の "packageManager" 指定を corepack に尊重させる（自動書き換えを防ぐ）
COREPACK_ENABLE_AUTO_PIN = "0"
# 評価者環境で corepack の対話プロンプトを抑制
COREPACK_ENABLE_DOWNLOAD_PROMPT = "0"

[tasks.setup]
description = "初回セットアップ: corepack 有効化 + 依存インストール"
run = ["corepack enable", "pnpm install"]
